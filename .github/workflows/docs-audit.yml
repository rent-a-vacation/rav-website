name: Documentation Audit

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  docs-audit:
    name: Audit Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need HEAD~1 for source-to-doc mapping

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run docs audit
        id: audit
        run: |
          npx tsx scripts/docs-audit.ts --ci 2>&1 | tee audit-report.txt
        continue-on-error: true

      - name: Run docs sync-check (session currency)
        id: sync
        run: |
          npx tsx scripts/docs-sync-check.ts --ci 2>&1 | tee sync-report.txt
        continue-on-error: true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-audit-report
          path: |
            audit-report.txt
            sync-report.txt

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const audit = fs.readFileSync('audit-report.txt', 'utf-8');
            const sync = fs.existsSync('sync-report.txt') ? fs.readFileSync('sync-report.txt', 'utf-8') : '(sync-check did not run)';
            const body = `## 📋 Documentation Audit\n\n\`\`\`\n${audit}\n\`\`\`\n\n## 🔄 Documentation Sync Check\n\n\`\`\`\n${sync}\n\`\`\`\n\n_Auto-generated by docs-audit workflow_`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('Documentation Audit'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on errors
        if: steps.audit.outcome == 'failure' || steps.sync.outcome == 'failure'
        run: |
          echo "One or more documentation checks failed — see audit-report.txt and sync-report.txt in artifacts."
          exit 1

name: SDLC Docs Sync

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  sdlc-docs:
    name: /sdlc-docs audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so origin/main is available for the diff

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" = "main" ]; then
            echo "mode=gate" >> "$GITHUB_OUTPUT"
            echo "base=origin/main" >> "$GITHUB_OUTPUT"
            echo "label=GATE (blocks merge if drift)" >> "$GITHUB_OUTPUT"
          else
            # push to dev
            echo "mode=warn" >> "$GITHUB_OUTPUT"
            echo "base=origin/main" >> "$GITHUB_OUTPUT"
            echo "label=WARN (informational, never blocks)" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch base ref
        run: git fetch origin main:refs/remotes/origin/main

      - name: Run /sdlc-docs audit
        id: audit
        run: |
          echo "Running /sdlc-docs audit in ${{ steps.mode.outputs.label }}..."
          npx tsx scripts/sdlc-docs.ts audit --${{ steps.mode.outputs.mode }} --base ${{ steps.mode.outputs.base }} 2>&1 | tee sdlc-docs-report.txt
        continue-on-error: false  # gate-mode is allowed to fail this step intentionally

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdlc-docs-report
          path: sdlc-docs-report.txt

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('sdlc-docs-report.txt')
              ? fs.readFileSync('sdlc-docs-report.txt', 'utf-8')
              : '(report not generated)';
            const mode = '${{ steps.mode.outputs.label }}';
            const status = '${{ steps.audit.outcome }}';
            const icon = status === 'success' ? '✅' : '🛑';
            const body = `## ${icon} /sdlc-docs audit — ${mode}\n\n\`\`\`\n${report}\n\`\`\`\n\n_Auto-generated by .github/workflows/sdlc-docs.yml. See [SKILL.md](.claude/skills/sdlc-docs/SKILL.md) for rule definitions._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('/sdlc-docs audit'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
